name: Pull brochure data from Notion (auto-sync)

# Auto-sync pipeline:
#   1. Pull all brochure rows from Notion → data/<alias>_payload.json
#   2. Inject bilingual content into Brochures html/* (legacy VI_STRINGS/EN_STRINGS arrays)
#   3. Commit both to main — wp-sync.yml then auto-deploys HTML to WordPress
#
# Runs every 10 minutes via cron, plus manual workflow_dispatch.
# Requires NOTION_KEY in repo secrets.

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show diff, no write/commit)'
        type: boolean
        required: false
        default: false

concurrency:
  group: pull-notion
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull payloads from Notion
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python tools/pull_from_notion.py --dry-run
          else
            python tools/pull_from_notion.py
          fi

      - name: Inject EN content into brochure HTML
        if: inputs.dry_run != 'true'
        run: python tools/inject_notion_en_to_html.py

      - name: Inject EN content (dry-run preview)
        if: inputs.dry_run == 'true'
        run: python tools/inject_notion_en_to_html.py --dry-run

      - name: Commit refreshed payloads + HTML
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*_payload.json "Brochures html/"*.html || true
          if git diff --cached --quiet; then
            echo "No changes — Notion content already in sync."
          else
            git commit -m "Auto-sync brochure content from Notion

            Pulled fresh payloads + injected EN content into legacy
            VI_STRINGS / EN_STRINGS arrays across all 12 brochures.
            The wp-sync workflow will deploy these HTML changes to
            WordPress on next push."
            git push origin main
            echo "Pushed — wp-sync.yml will deploy to WordPress within ~30s."
          fi
