name: Pull brochure data from Notion (auto-sync)

# Auto-sync pipeline:
#   1. Pull all brochure rows from Notion → data/<alias>_payload.json
#   2. Inject bilingual content into Brochures html/* (legacy VI_STRINGS/EN_STRINGS arrays)
#   3. Commit both to main — wp-sync.yml then auto-deploys HTML to WordPress
#
# Runs every 10 minutes via cron, plus manual workflow_dispatch.
# Requires NOTION_KEY in repo secrets.

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show diff, no write/commit)'
        type: boolean
        required: false
        default: false

concurrency:
  group: pull-notion
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull payloads from Notion
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python tools/pull_from_notion.py --dry-run
          else
            python tools/pull_from_notion.py
          fi

      - name: Inject EN content into brochure HTML
        if: inputs.dry_run != 'true'
        run: python tools/inject_notion_en_to_html.py

      - name: Inject EN content (dry-run preview)
        if: inputs.dry_run == 'true'
        run: python tools/inject_notion_en_to_html.py --dry-run

      - name: Refresh Live Listings spotlight from Property Hub
        # Picks up any listing add/edit/delete on the PH Notion DB
        # within ~10min — same cadence as the brochure-content sync above.
        if: inputs.dry_run != 'true'
        run: python tools/apply_listings.py

      - name: Refresh Overview deck cards from Notion
        # Picks up any overview-deck card add/edit/reorder from the
        # 🎴 NAC - Overview Deck DB. Edits propagate within ≤10min, same as
        # the listings sync above.
        #
        # NON-FATAL: this step must never abort the whole pipeline. If the
        # overview DB isn't shared with the NOTION_KEY integration (HTTP 404)
        # or Notion is briefly unavailable, the brochure-content sync + WP push
        # below should still run. The overview HTML on main is then used as-is.
        if: inputs.dry_run != 'true'
        continue-on-error: true
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: python tools/pull_overview_from_notion.py

      - name: Verify EN translation coverage
        run: |
          # Run the coverage check, capture summary into .diagnostics/
          mkdir -p .diagnostics
          python tools/check_en_translation_coverage.py | tee .diagnostics/en-coverage-summary.txt
          # Non-zero exit means some brochure < 70% — log it but don't fail the run
          # (we want the commit to land even if coverage is partial)

      - name: Commit refreshed payloads + HTML + coverage report
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*_payload.json "Brochures html/"*.html .diagnostics/ || true
          if git diff --cached --quiet; then
            echo "No changes — Notion content already in sync."
            echo "SKIP_WP_SYNC=true" >> $GITHUB_ENV
          else
            # Pull current coverage stats for the commit message
            AVG=$(python -c "import json; r=json.load(open('.diagnostics/en-coverage.json'))['reports']; print(f\"{sum(b['coverage_pct'] for b in r)/len(r):.1f}%\")")
            git commit -m "Auto-sync brochure content from Notion (EN coverage: $AVG)

            Pulled fresh payloads + injected EN content into legacy
            VI_STRINGS / EN_STRINGS arrays. Coverage report written
            to .diagnostics/en-coverage.json — see per-brochure
            translated/gap/skip counts."
            git push origin main
            echo "Pushed to main."
            echo "SKIP_WP_SYNC=false" >> $GITHUB_ENV
          fi

      # WORKFLOW-CHAIN WORKAROUND:
      # Commits made by GITHUB_TOKEN don't trigger other workflows, so
      # wp-sync.yml won't fire on the commit above. We inline the WP
      # sync here so the auto-sync pipeline actually reaches WordPress.
      - name: Push to WordPress (inline — workflow-chain limitation)
        if: inputs.dry_run != 'true' && env.SKIP_WP_SYNC != 'true'
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          python sync_brochures.py --all
          echo "Brochures synced to WordPress."

      - name: Verify live coverage post-sync
        if: inputs.dry_run != 'true' && env.SKIP_WP_SYNC != 'true'
        run: |
          # Brief delay so WP cache propagates before we hit it
          sleep 30
          python tools/check_live_en_coverage.py | tee -a .diagnostics/live-coverage-summary.txt || true
          # Re-commit only the live coverage artefact (separate commit so
          # the message clearly distinguishes pre/post-sync state)
          git add .diagnostics/live-en-coverage.json .diagnostics/live-coverage-summary.txt || true
          if ! git diff --cached --quiet; then
            LIVE_AVG=$(python -c "import json; r=json.load(open('.diagnostics/live-en-coverage.json'))['reports']; print(f\"{sum(b['coverage_pct'] for b in r)/len(r):.1f}%\")")
            git commit -m "Live EN coverage snapshot: $LIVE_AVG"
            git push origin main || true
          fi

      - name: Regenerate sheet tracker (TSV for Google Sheets A28:J39)
        if: inputs.dry_run != 'true' && env.SKIP_WP_SYNC != 'true'
        run: |
          python tools/generate_sheet_tracker.py
          git add .diagnostics/sheet-tracker.tsv .diagnostics/sheet-tracker.md .diagnostics/sheet-tracker-header.tsv || true
          if ! git diff --cached --quiet; then
            git commit -m "Update sheet tracker (paste-ready for backlink tab A28:J39)"
            git push origin main || true
          fi
