name: Notion brochure DB tools

# Triggers:
#   - push to the feature branch when data/.notion-run is touched
#     → runs setup-schema THEN push-turkey (both real). Touch the
#       marker file with a one-line note and push.
#   - manual workflow_dispatch — pick a specific action with dry_run toggle.
#
# Requires NOTION_KEY in repo secrets.

on:
  push:
    branches:
      - claude/add-nomad-brochures-68jHG
      - main
    paths:
      - 'data/.notion-run'
      - 'data/brochure_schema.py'
      - 'data/turkey_payload.json'
      - 'tools/setup_brochure_db.py'
      - 'tools/push_brochure.py'
  workflow_dispatch:
    inputs:
      action:
        description: 'Which tool to run'
        type: choice
        required: true
        default: 'setup-schema'
        options:
          - setup-schema
          - extract-and-push-all
          - push-all
          - push-one
      alias:
        description: 'For action=push-one: brochure alias (e.g. portugal)'
        required: false
        default: 'portugal'
      dry_run:
        description: 'Dry run only (preview; no writes)'
        type: boolean
        required: false
        default: true

concurrency:
  group: notion-brochure-db
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decide what to do
        id: plan
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "action=extract-and-push-all" >> $GITHUB_OUTPUT
            echo "dry="                         >> $GITHUB_OUTPUT
            echo "alias=--all"                  >> $GITHUB_OUTPUT
          else
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
            echo "alias=${{ github.event.inputs.alias }}"   >> $GITHUB_OUTPUT
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              echo "dry=--dry-run" >> $GITHUB_OUTPUT
            else
              echo "dry="          >> $GITHUB_OUTPUT
            fi
          fi
          echo "Will run: ${{ steps.plan.outputs.action }} (alias=${{ steps.plan.outputs.alias }}, dry=${{ steps.plan.outputs.dry }})"

      - name: Setup brochure DB schema
        if: steps.plan.outputs.action == 'setup-schema'
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: python tools/setup_brochure_db.py ${{ steps.plan.outputs.dry }}

      - name: Extract all brochures
        if: steps.plan.outputs.action == 'extract-and-push-all'
        run: python tools/extract_brochure.py --all

      - name: Push all brochures
        if: steps.plan.outputs.action == 'extract-and-push-all' || steps.plan.outputs.action == 'push-all'
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: python tools/push_brochure.py --all ${{ steps.plan.outputs.dry }}

      - name: Push one brochure
        if: steps.plan.outputs.action == 'push-one'
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: |
          python tools/extract_brochure.py ${{ steps.plan.outputs.alias }}
          python tools/push_brochure.py ${{ steps.plan.outputs.alias }} ${{ steps.plan.outputs.dry }}
