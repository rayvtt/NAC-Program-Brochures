name: Scan QA Tracker (daily)

# Reads the published-to-web Google Sheet QA tracker, identifies
# unchecked cells, and writes the current status to
# .diagnostics/qa-status.md. Commits the diff so the file's git
# history is your QA log.
#
# Requires a repo secret QA_TRACKER_CSV_URL containing the "Publish
# to web → CSV" URL from the Google Sheet.

on:
  schedule:
    # Daily at 09:00 UTC = 16:00 Vietnam (ICT)
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: qa-tracker-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan tracker
        env:
          QA_TRACKER_CSV_URL: ${{ secrets.QA_TRACKER_CSV_URL }}
        run: python tools/scan_qa_tracker.py

      - name: Commit qa-status.md if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/qa-status.md || true
          if git diff --cached --quiet; then
            echo "No QA status changes."
            exit 0
          fi
          git commit -m "QA tracker scan: $(date -u +'%Y-%m-%d')"
          git push origin main
