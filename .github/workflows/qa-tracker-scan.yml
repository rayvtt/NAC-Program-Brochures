name: Scan QA Tracker (daily)

# Reads the ✅ NAC Brochures - QA Tracker Notion DB, identifies
# unticked checkboxes, writes the status to .diagnostics/qa-status.md
# and commits the diff. Uses the existing NOTION_KEY secret.

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: qa-tracker-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan QA Tracker (Notion)
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: python tools/scan_qa_tracker.py

      - name: Commit qa-status.md if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/qa-status.md || true
          if git diff --cached --quiet; then
            echo "No QA status changes."; exit 0
          fi
          git commit -m "QA tracker scan: $(date -u +'%Y-%m-%d')"
          git push origin main
