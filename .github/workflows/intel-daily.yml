name: Daily intel sweep (policy / pricing / community)

# Scrapes each country's configured sources (intel_sources.py) every day at
# 03:00 UTC. Writes per-day signal files to .diagnostics/weekly-intel/<date>/
# which the weekly digest then rolls up into a GitHub Issue with checkbox
# tasks.
#
# Defensive on purpose: a fetch failure on any single source does not fail
# the workflow — the day's snapshot just records fewer signals.

on:
  schedule:
    - cron: '0 3 * * *'      # daily 03:00 UTC
  workflow_dispatch:
    inputs:
      country:
        description: 'Single country alias (e.g. turkey). Empty = all 12'
        required: false
        default: ''

concurrency:
  group: intel-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gather:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily intel sweep
        run: |
          if [ -n "${{ inputs.country }}" ]; then
            python tools/intel_gather.py "${{ inputs.country }}"
          else
            python tools/intel_gather.py
          fi

      - name: Commit raw signal snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/weekly-intel/ || true
          if git diff --cached --quiet; then
            echo "No new signals — nothing to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Intel sweep $DATE: $(ls .diagnostics/weekly-intel/$DATE/ 2>/dev/null | wc -l) countries scanned"
            git push origin main
          fi
