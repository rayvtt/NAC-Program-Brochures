name: Sync brochures to WordPress

# End-to-end deploy: Notion DB → payloads → HTML → WP.
#
#   1. Pull fresh brochure data from Notion ([NAC - Program Brochures])
#   2. Render HTML from payloads — TURKEY ONLY (build_brochures.py).
#      Other 11 brochures use the hand-crafted HTML committed in
#      `Brochures html/` (themes, charts, EN toggle, banners are
#      country-specific and not yet covered by the build system).
#   3. Refresh the LISTINGS spotlight from Property Hub on all 12
#      (apply_listings.py only touches the LISTINGS START/END markers).
#   4. Push the resulting HTML to WP via REST API (sync_brochures.py).
#
# Source of truth: Notion for Turkey copy + Perplexity-autotranslated
# EN fields; committed HTML files for the other 11 brochures.

on:
  push:
    branches:
      - main
      - claude/add-nomad-brochures-68jHG   # auto-validate (turkey-only sync to live)
    paths:
      - 'Brochures html/**'
      - 'NAC-RESIDENCE-INDEX.html'
      - 'data/**'
      - 'tools/pull_from_notion.py'
      - 'tools/build_brochures.py'
      - 'tools/apply_listings.py'
      - 'sync_brochures.py'
      - '.github/workflows/wp-sync.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Alias to push (e.g. turkey, portugal) or --all'
        required: false
        default: '--all'
      dry_run:
        description: 'Dry run only (no PUT to WP)'
        type: boolean
        required: false
        default: false
      skip_pull:
        description: 'Skip Notion pull (use payloads already in repo)'
        type: boolean
        required: false
        default: false

concurrency:
  group: wp-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull fresh brochure data from Notion
        if: github.event.inputs.skip_pull != 'true'
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: |
          python tools/pull_from_notion.py
          echo "---"
          echo "Payload diff after Notion pull:"
          git diff --stat data/ || true

      - name: Build brochure HTML from payloads (TURKEY ONLY)
        run: |
          # Only Turkey is Notion-driven for now. The other 11 brochures
          # keep their hand-crafted HTML in Brochures html/ (country-
          # specific themes, charts, banners, EN toggle). Re-adding them
          # to the build needs build_brochures.py to handle those.
          python tools/build_brochures.py turkey
          cp build/turkey-cbi_8.html "Brochures html/turkey-cbi_8.html"
          rm -rf build
          echo "---"
          echo "Brochure HTML files after build (turkey only):"
          git diff --stat 'Brochures html/' || true

      - name: Refresh listings spotlight from Property Hub (live fetch)
        run: |
          python tools/apply_listings.py
          echo "---"
          echo "Brochure HTML files after listings refresh:"
          git diff --stat 'Brochures html/' || true

      - name: Sync to WordPress
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          # Decide target + dry-run based on trigger.
          #   workflow_dispatch → use the dropdown inputs
          #   push to main      → --all (real)
          #   push to feature   → turkey only (real, end-to-end validation)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target || '--all' }}"
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; else DRY=""; fi
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET="--all"
            DRY=""
          else
            TARGET="turkey"
            DRY=""
          fi
          echo "Trigger: ${{ github.event_name }} on ${{ github.ref }}"
          echo "Running: python sync_brochures.py $TARGET $DRY"
          python sync_brochures.py $TARGET $DRY
