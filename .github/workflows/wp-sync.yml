name: Sync brochures to WordPress

# End-to-end deploy: Notion DB → payloads → HTML → WP.
#
#   1. Pull fresh brochure data from Notion ([NAC - Program Brochures])
#   2. Render HTML from payloads (build_brochures.py overwrites
#      Brochures html/<filename> with generated output)
#   3. Refresh the LISTINGS spotlight from Property Hub (apply_listings.py)
#   4. Push the resulting HTML to WP via REST API (sync_brochures.py)
#
# Each step's output is captured into .diagnostics/last-run.md and
# pushed to the `ci-diagnostics` branch on completion (always — even
# if the run fails). That branch is readable by Claude via the GitHub
# API without needing log access.
#
# Source of truth: Notion. The committed files in `Brochures html/` are
# build snapshots — CI regenerates them on each deploy.

on:
  push:
    branches:
      - main
      - claude/add-nomad-brochures-68jHG   # auto-validate (turkey-only sync to live)
    paths:
      - 'Brochures html/**'
      - 'NAC-RESIDENCE-INDEX.html'
      - 'data/**'
      - 'tools/pull_from_notion.py'
      - 'tools/build_brochures.py'
      - 'tools/apply_listings.py'
      - 'sync_brochures.py'
      - '.github/workflows/wp-sync.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Alias to push (e.g. turkey, portugal) or --all'
        required: false
        default: '--all'
      dry_run:
        description: 'Dry run only (no PUT to WP)'
        type: boolean
        required: false
        default: false
      skip_pull:
        description: 'Skip Notion pull (use payloads already in repo)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write     # needed to push diagnostic snapshot to ci-diagnostics branch

concurrency:
  group: wp-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Init diagnostic log
        run: |
          mkdir -p .diagnostics
          {
            echo "# WP Sync run — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "- Trigger: \`${{ github.event_name }}\` on \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo
          } > .diagnostics/last-run.md

      - name: Pull fresh brochure data from Notion
        if: github.event.inputs.skip_pull != 'true'
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
        run: |
          {
            echo "## Pull from Notion"
            echo '```'
            python tools/pull_from_notion.py
            echo '```'
            echo
          } 2>&1 | tee -a .diagnostics/last-run.md

      - name: Build brochure HTML from payloads
        run: |
          {
            echo "## Build brochures"
            echo '```'
            python tools/build_brochures.py --all
            for f in build/*.html; do cp "$f" "Brochures html/$(basename "$f")"; done
            rm -rf build
            echo '```'
            echo
          } 2>&1 | tee -a .diagnostics/last-run.md

      - name: Refresh listings spotlight from Property Hub (live fetch)
        run: |
          {
            echo "## Refresh listings spotlight"
            echo '```'
            python tools/apply_listings.py
            echo '```'
            echo
          } 2>&1 | tee -a .diagnostics/last-run.md

      - name: Sync to WordPress
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          {
            echo "## Sync to WP"
            echo '```'
            # Decide target + dry-run based on trigger.
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TARGET="${{ github.event.inputs.target || '--all' }}"
              if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; else DRY=""; fi
            elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
              TARGET="--all"
              DRY=""
            else
              TARGET="turkey"
              DRY=""
            fi
            echo "Trigger: ${{ github.event_name }} on ${{ github.ref }}"
            echo "Running: python sync_brochures.py $TARGET $DRY"
            python sync_brochures.py $TARGET $DRY
            echo '```'
            echo
          } 2>&1 | tee -a .diagnostics/last-run.md

      - name: Save diagnostic snapshot to ci-diagnostics branch
        if: always()
        run: |
          # Snapshot the file outside the worktree before switching branches
          cp .diagnostics/last-run.md /tmp/last-run.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Switch to ci-diagnostics (create as orphan on first run)
          if git fetch origin ci-diagnostics 2>/dev/null; then
            git checkout -B ci-diagnostics origin/ci-diagnostics
          else
            git checkout --orphan ci-diagnostics
            git rm -rf . > /dev/null 2>&1 || true
            git clean -fdx > /dev/null 2>&1 || true
          fi

          mkdir -p .diagnostics
          cp /tmp/last-run.md .diagnostics/last-run.md

          # Also keep a per-run archive
          ARCHIVE=".diagnostics/runs/${{ github.run_id }}.md"
          mkdir -p .diagnostics/runs
          cp /tmp/last-run.md "$ARCHIVE"

          git add .diagnostics/
          git commit -m "ci: diagnostic from run ${{ github.run_id }}" || echo "no changes"
          git push origin ci-diagnostics
