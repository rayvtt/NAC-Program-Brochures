name: Sync brochures to WordPress

on:
  push:
    branches:
      - main
      - claude/add-nomad-brochures-68jHG   # auto-validate against a single brochure (turkey)
    paths:
      - 'Brochures html/**'
      - 'NAC-RESIDENCE-INDEX.html'
      - 'sync_brochures.py'
      - '.github/workflows/wp-sync.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Alias to push (e.g. turkey, portugal) or --all'
        required: false
        default: '--all'
      dry_run:
        description: 'Dry run only (no PUT to WP)'
        type: boolean
        required: false
        default: false

concurrency:
  group: wp-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync to WordPress
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          # Decide target + dry-run based on trigger.
          #   workflow_dispatch → use the dropdown inputs
          #   push to main      → --all (real)
          #   push to feature   → turkey only (real, so we validate the ACF write)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target || '--all' }}"
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; else DRY=""; fi
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET="--all"
            DRY=""
          else
            TARGET="turkey"
            DRY=""
          fi
          echo "Trigger: ${{ github.event_name }} on ${{ github.ref }}"
          echo "Running: python sync_brochures.py $TARGET $DRY"
          python sync_brochures.py $TARGET $DRY
