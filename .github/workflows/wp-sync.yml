name: Sync brochures to WordPress

# Deploy pipeline: refresh listings → push HTML to WP.
#
#   1. Refresh the LISTINGS spotlight from Property Hub (apply_listings.py)
#      — pulls live property data from the Notion-backed worker and
#      re-renders the spotlight section between #02 and #03 in each brochure.
#   2. Push the resulting HTML to WP via REST API (sync_brochures.py).
#
# Source of truth for everything OTHER than listings is the committed HTML
# in `Brochures html/`. The Notion → HTML build pipeline (pull_from_notion +
# build_brochures) is intentionally disabled — hand-edits to the HTML files
# are authoritative; a Notion-driven rebuild would clobber them.
#
# Each step's output is captured into .diagnostics/last-run.md and
# pushed to the `ci-diagnostics` branch on completion (always — even
# if the run fails). That branch is readable without log access.

on:
  push:
    branches:
      - main
    paths:
      - 'Brochures html/**'
      - 'tools/apply_listings.py'
      - 'data/listings.py'
      - 'sync_brochures.py'
      - '.github/workflows/wp-sync.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Alias to push (e.g. turkey, portugal) or --all'
        required: false
        default: '--all'
      dry_run:
        description: 'Dry run only (no PUT to WP)'
        type: boolean
        required: false
        default: false
      skip_listings:
        description: 'Skip apply_listings refresh (push HTML as-is)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write     # needed to push diagnostic snapshot to ci-diagnostics branch

concurrency:
  group: wp-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Init diagnostic log
        run: |
          mkdir -p .diagnostics
          {
            echo "# WP Sync run — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "- Trigger: \`${{ github.event_name }}\` on \`${{ github.ref }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Run: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
            echo
          } > .diagnostics/last-run.md

      - name: Refresh listings spotlight from Property Hub (live fetch)
        if: github.event.inputs.skip_listings != 'true'
        run: |
          {
            echo "## Refresh listings spotlight"
            echo '```'
            python tools/apply_listings.py
            echo '```'
            echo
          } 2>&1 | tee -a .diagnostics/last-run.md

      - name: Sync to WordPress
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          {
            echo "## Sync to WP"
            echo '```'
            # Decide target + dry-run based on trigger.
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              TARGET="${{ github.event.inputs.target || '--all' }}"
              if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; else DRY=""; fi
            elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
              TARGET="--all"
              DRY=""
            else
              TARGET="turkey"
              DRY=""
            fi
            echo "Trigger: ${{ github.event_name }} on ${{ github.ref }}"
            echo "Running: python sync_brochures.py $TARGET $DRY"
            python sync_brochures.py $TARGET $DRY
            echo '```'
            echo
          } 2>&1 | tee -a .diagnostics/last-run.md

      - name: Save diagnostic snapshot to ci-diagnostics branch
        if: always()
        run: |
          # Snapshot the file outside the worktree before switching branches
          cp .diagnostics/last-run.md /tmp/last-run.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Switch to ci-diagnostics (create as orphan on first run)
          if git fetch origin ci-diagnostics 2>/dev/null; then
            git checkout -B ci-diagnostics origin/ci-diagnostics
          else
            git checkout --orphan ci-diagnostics
            git rm -rf . > /dev/null 2>&1 || true
            git clean -fdx > /dev/null 2>&1 || true
          fi

          mkdir -p .diagnostics
          cp /tmp/last-run.md .diagnostics/last-run.md

          # Also keep a per-run archive
          ARCHIVE=".diagnostics/runs/${{ github.run_id }}.md"
          mkdir -p .diagnostics/runs
          cp /tmp/last-run.md "$ARCHIVE"

          git add .diagnostics/
          git commit -m "ci: diagnostic from run ${{ github.run_id }}" || echo "no changes"
          git push origin ci-diagnostics
